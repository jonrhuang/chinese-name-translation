<main class="main">
  <div class="title">
    <h1> Ink & Name</h1>
    <p>Discover your name in Chinese Calligraphy</p>

    <app-search-form (onSearch)="onFind($event)"></app-search-form>
  </div>

  <div class="content-wrapper">
    <results-container [cards]="cards()" [selectedCardId]="selectedCardId" (cardClicked)="onCardClick($event)"></results-container>

    <app-character-container [selectedCardWriter]="selectedCardWriter()" (changeCharacter)="changeCharacter($event)"></app-character-container>

    <edit-container [selectedCharWriter]="changeOptions()" (changeCharacter)="editCharacter($event)"></edit-container>
  </div>
</main>
